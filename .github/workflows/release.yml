name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  RELEASE_ASSET_NAME: codex-claude-windows-taskbar.exe

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Rename release binary
        shell: pwsh
        run: |
          Copy-Item target/release/codex-claude-windows-taskbar.exe $env:RELEASE_ASSET_NAME

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_ASSET_NAME }}
          generate_release_notes: true
